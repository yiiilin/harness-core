<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>harness-core Architecture Tour</title>
  <style>
    :root {
      --bg: #f3eee2;
      --bg-2: #f8f5ee;
      --panel: rgba(255, 252, 246, 0.88);
      --panel-strong: rgba(255, 250, 242, 0.97);
      --ink: #182126;
      --muted: #56656d;
      --line: rgba(24, 33, 38, 0.12);
      --line-strong: rgba(24, 33, 38, 0.22);
      --blueprint: #0c5f73;
      --accent: #df6f3e;
      --accent-2: #0f7a63;
      --shadow: 0 18px 48px rgba(31, 39, 44, 0.13);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      --body: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15, 122, 99, 0.09), transparent 32%),
        radial-gradient(circle at top right, rgba(223, 111, 62, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-2), var(--bg));
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      filter: blur(42px);
      opacity: 0.5;
    }

    body::before {
      width: 20rem;
      height: 20rem;
      top: -5rem;
      right: -2rem;
      background: rgba(12, 95, 115, 0.16);
      border-radius: 999px;
    }

    body::after {
      width: 24rem;
      height: 24rem;
      bottom: -8rem;
      left: -4rem;
      background: rgba(223, 111, 62, 0.14);
      border-radius: 999px;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1500px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .hero,
    .section-card,
    .inspector,
    .footer-card {
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 28px 28px 30px;
      margin-bottom: 22px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(12, 95, 115, 0.08), transparent 45%),
        linear-gradient(300deg, rgba(223, 111, 62, 0.12), transparent 40%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      position: relative;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--blueprint);
      font-weight: 700;
    }

    .eyebrow::before {
      content: "";
      width: 44px;
      height: 1px;
      background: currentColor;
      opacity: 0.6;
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
    }

    .lang-switch button {
      border: 0;
      padding: 10px 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .lang-switch button.active {
      color: #fff;
      background: linear-gradient(135deg, var(--blueprint), #0a4554);
      transform: translateY(-1px);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(300px, 0.95fr);
      gap: 22px;
      align-items: end;
      margin-top: 24px;
      position: relative;
    }

    .hero-copy h1 {
      margin: 10px 0 14px;
      font-family: var(--display);
      font-weight: 700;
      font-size: clamp(2.7rem, 5vw, 5rem);
      line-height: 0.94;
      letter-spacing: -0.04em;
      max-width: 12ch;
    }

    .hero-copy p {
      margin: 0;
      max-width: 64ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    .pill-row,
    .hero-links,
    .legend-row,
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill-row {
      margin-top: 16px;
    }

    .pill,
    .legend-chip,
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      padding: 9px 12px;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
    }

    .pill::before,
    .legend-chip::before,
    .tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--blueprint);
    }

    .pill.orange::before,
    .legend-chip.orange::before,
    .tag.orange::before {
      background: var(--accent);
    }

    .pill.green::before,
    .legend-chip.green::before,
    .tag.green::before {
      background: var(--accent-2);
    }

    .hero-side {
      display: grid;
      gap: 16px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      min-height: 110px;
    }

    .stat-card .value {
      font-family: var(--display);
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 10px;
    }

    .stat-card .label {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .stat-card .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero-links {
      margin-top: 14px;
    }

    .hero-links a {
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      border-bottom: 1px solid transparent;
      transition: border-color 160ms ease, color 160ms ease;
    }

    .hero-links a:hover {
      color: var(--blueprint);
      border-color: currentColor;
    }

    .section-card {
      border-radius: var(--radius-xl);
      padding: 22px;
      margin-bottom: 18px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-head h2 {
      margin: 0;
      font-family: var(--display);
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 70ch;
    }

    .architecture-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.9fr);
      gap: 18px;
    }

    .architecture-board {
      position: relative;
      padding: 18px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(250, 246, 239, 0.92)),
        repeating-linear-gradient(90deg, rgba(12, 95, 115, 0.06) 0, rgba(12, 95, 115, 0.06) 1px, transparent 1px, transparent 72px),
        repeating-linear-gradient(180deg, rgba(12, 95, 115, 0.04) 0, rgba(12, 95, 115, 0.04) 1px, transparent 1px, transparent 72px);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .architecture-board::before {
      content: "";
      position: absolute;
      inset: 8% 5%;
      border: 1px dashed rgba(12, 95, 115, 0.18);
      border-radius: 24px;
      pointer-events: none;
    }

    .legend-row {
      margin-bottom: 16px;
    }

    .layer-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      align-items: start;
      position: relative;
    }

    .layer-grid::before {
      content: "";
      position: absolute;
      left: 11%;
      right: 11%;
      top: 58px;
      height: 1px;
      background:
        linear-gradient(90deg, rgba(12, 95, 115, 0.08), rgba(12, 95, 115, 0.28), rgba(223, 111, 62, 0.22), rgba(12, 95, 115, 0.08));
      pointer-events: none;
    }

    .layer-column {
      position: relative;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .layer-column::before {
      content: "";
      position: absolute;
      left: calc(50% - 0.5px);
      top: 58px;
      bottom: 10px;
      width: 1px;
      background: linear-gradient(180deg, rgba(12, 95, 115, 0.28), rgba(12, 95, 115, 0.06));
      pointer-events: none;
    }

    .layer-head {
      position: relative;
      z-index: 1;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      min-height: 112px;
    }

    .layer-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blueprint);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .layer-title {
      font-family: var(--display);
      font-size: 1.35rem;
      line-height: 1.02;
      margin-bottom: 6px;
    }

    .layer-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .node-card {
      position: relative;
      z-index: 1;
      text-align: left;
      width: 100%;
      padding: 16px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
      min-height: 126px;
    }

    .node-card:hover,
    .node-card.active {
      transform: translateY(-2px);
      border-color: rgba(12, 95, 115, 0.34);
      box-shadow: 0 14px 24px rgba(21, 31, 35, 0.08);
      background: rgba(255, 255, 255, 0.92);
    }

    .node-card.outside {
      border-style: dashed;
      background: rgba(255, 246, 241, 0.78);
    }

    .node-group {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blueprint);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .node-title {
      font-family: var(--display);
      font-size: 1.2rem;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .node-subtitle {
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .node-mini {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .mini-chip {
      font-size: 11px;
      line-height: 1;
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(12, 95, 115, 0.08);
      color: var(--blueprint);
      border: 1px solid rgba(12, 95, 115, 0.09);
      font-weight: 700;
    }

    .inspector {
      position: sticky;
      top: 18px;
      align-self: start;
      border-radius: 26px;
      padding: 20px;
      background: var(--panel-strong);
    }

    .inspector-head {
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .inspector-path {
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: var(--blueprint);
      word-break: break-word;
    }

    .inspector-title {
      margin: 10px 0 8px;
      font-family: var(--display);
      font-size: 2rem;
      line-height: 0.98;
    }

    .inspector-summary {
      color: var(--muted);
      line-height: 1.75;
      margin: 0;
    }

    .inspector-block {
      margin-top: 18px;
    }

    .inspector-block h3 {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blueprint);
    }

    .list {
      display: grid;
      gap: 8px;
      padding-left: 0;
      margin: 0;
      list-style: none;
    }

    .list li {
      position: relative;
      padding-left: 18px;
      color: var(--ink);
      line-height: 1.62;
    }

    .list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.72em;
      width: 9px;
      height: 1px;
      background: var(--accent);
    }

    .inspector-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .inspector-links a,
    .nav-link,
    .matrix-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(12, 95, 115, 0.08);
      border: 1px solid rgba(12, 95, 115, 0.08);
      font-size: 12px;
      font-weight: 700;
    }

    .grid-two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .cap-card,
    .matrix-card,
    .journey-card,
    .boundary-card {
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      padding: 18px;
    }

    .cap-card h3,
    .matrix-card h3,
    .journey-card h3,
    .boundary-card h3 {
      margin: 0 0 10px;
      font-family: var(--display);
      font-size: 1.35rem;
      line-height: 1.05;
    }

    .cap-card p,
    .matrix-card p,
    .journey-card p,
    .boundary-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .matrix-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .matrix-path {
      font-family: "Courier New", monospace;
      font-size: 12px;
      color: var(--blueprint);
    }

    .matrix-meta {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    .journey-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .journey-step {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blueprint);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .boundary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .boundary-card.outside {
      background: rgba(255, 246, 241, 0.82);
    }

    .footer-card {
      border-radius: 26px;
      padding: 18px 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      align-items: center;
      justify-content: space-between;
    }

    .footer-copy {
      color: var(--muted);
      line-height: 1.7;
      max-width: 72ch;
    }

    .footer-copy strong {
      color: var(--ink);
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (max-width: 1160px) {
      .hero-grid,
      .architecture-shell,
      .matrix-grid,
      .journey-grid,
      .boundary-grid,
      .grid-two {
        grid-template-columns: 1fr;
      }

      .layer-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .inspector {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 18px 12px 44px;
      }

      .hero,
      .section-card,
      .footer-card {
        border-radius: 22px;
      }

      .hero {
        padding: 18px;
      }

      .hero-top,
      .section-head {
        flex-direction: column;
        align-items: stretch;
      }

      .stat-grid,
      .layer-grid {
        grid-template-columns: 1fr;
      }

      .layer-grid::before,
      .layer-column::before {
        display: none;
      }

      .hero-copy h1 {
        font-size: clamp(2.2rem, 11vw, 3.2rem);
        line-height: 0.9;
        letter-spacing: -0.05em;
        max-width: none;
      }

      .hero-copy p {
        line-height: 1.62;
      }

      .lang-switch {
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-top">
        <div>
          <div class="eyebrow" id="hero-eyebrow"></div>
        </div>
        <div class="lang-switch" aria-label="Language switch">
          <button type="button" data-lang="zh">中文</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
      <div class="hero-grid">
        <div class="hero-copy">
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle"></p>
          <div class="pill-row" id="hero-pills"></div>
          <div class="hero-links" id="hero-links"></div>
        </div>
        <aside class="hero-side">
          <div class="stat-grid" id="stat-grid"></div>
        </aside>
      </div>
    </header>

    <section class="section-card" id="atlas">
      <div class="section-head">
        <div>
          <h2 id="atlas-title"></h2>
          <p id="atlas-subtitle"></p>
        </div>
      </div>
      <div class="architecture-shell">
        <div class="architecture-board">
          <div class="legend-row" id="legend-row"></div>
          <div class="layer-grid" id="layer-grid"></div>
        </div>
        <aside class="inspector" id="inspector"></aside>
      </div>
    </section>

    <section class="section-card" id="capabilities">
      <div class="section-head">
        <div>
          <h2 id="cap-title"></h2>
          <p id="cap-subtitle"></p>
        </div>
      </div>
      <div class="grid-two" id="cap-grid"></div>
    </section>

    <section class="section-card" id="modules">
      <div class="section-head">
        <div>
          <h2 id="module-title"></h2>
          <p id="module-subtitle"></p>
        </div>
      </div>
      <div class="matrix-grid" id="module-grid"></div>
    </section>

    <section class="section-card" id="journeys">
      <div class="section-head">
        <div>
          <h2 id="journey-title"></h2>
          <p id="journey-subtitle"></p>
        </div>
      </div>
      <div class="journey-grid" id="journey-grid"></div>
    </section>

    <section class="section-card" id="boundary">
      <div class="section-head">
        <div>
          <h2 id="boundary-title"></h2>
          <p id="boundary-subtitle"></p>
        </div>
      </div>
      <div class="boundary-grid" id="boundary-grid"></div>
    </section>

    <footer class="footer-card">
      <div class="footer-copy" id="footer-copy"></div>
      <div class="footer-actions" id="footer-actions"></div>
    </footer>
  </div>

  <script>
    const state = {
      lang: localStorage.getItem("architecture-tour-lang") || "zh",
      activeNode: "pkg_harness",
    };

    const ui = {
      zh: {
        title: "harness-core · 双语架构展板",
        heroEyebrow: "Execution Kernel For Harness Engineering",
        heroTitle: "把执行语义放进内核，把产品语义留在外层。",
        heroSubtitle: "这是一张给 embedder 和维护者同时看的项目地图。它先解释 harness-core 到底是什么，再解释哪些能力已经内建、哪些能力通过 modules / adapters 暴露，以及哪些概念被明确挡在 kernel 之外。",
        heroPills: [
          { text: "单文件浏览器页面", tone: "green" },
          { text: "中英双语切换", tone: "orange" },
          { text: "适合接入方与维护者共读", tone: "" },
        ],
        heroLinks: [
          { href: "#atlas", text: "先看关系图" },
          { href: "#capabilities", text: "看支持的能力" },
          { href: "#modules", text: "看模块与入口" },
          { href: "#boundary", text: "看内核边界" },
        ],
        atlasTitle: "项目关系图",
        atlasSubtitle: "左到右看：稳定接入面 -> 核心运行时语义 -> companion modules -> transport / platform 外层。点击卡片，右侧会展开职责、边界和推荐阅读路径。",
        capTitle: "当前支持的核心能力",
        capSubtitle: "这些能力不是散落的 feature 列表，而是已经可以组合成真实 harness workflow 的执行模型。",
        moduleTitle: "模块与公开入口",
        moduleSubtitle: "如果你是在接入，重点看 path、责任和何时使用；如果你在维护，重点看它属于哪一层，不要越层塞概念。",
        journeyTitle: "建议的阅读 / 接入路径",

          body: "If you care about planning and context assembly, these examples show how runtime semantics fit around a planner.",

        },
      },
      {
        step: { zh: "Path 3", en: "Path 3" },
        link: "../examples/program-graph/README.md",
        zh: {

          body: "它展示 preplanned execution program、target fanout、aggregate verification、artifact/output refs。",

        },
        en: {

      {

        link: "../examples/platform-reference/README.md",
        zh: {

          body: "这是维护者和平台接入方最该读的例子之一，能看到 claim / lease / PTY / interactive 的平台外层组织方式。",
          tags: ["worker", "pty", "claimed execution"],
        },
        en: {
          title: "Use platform-reference for worker / PTY / claimed execution",
          body: "This is one of the best examples for maintainers and platform embedders because it shows claim / lease / PTY / interactive orchestration outside the kernel.",
          tags: ["worker", "pty", "claimed execution"],
        },
      },
      {
        step: { zh: "Path 5", en: "Path 5" },
        link: "../examples/postgres-embedded/README.md",
        zh: {
          title: "要 durable 就看 postgres-embedded / postgres-workers",
          body: "这里能看到公开 Postgres bootstrap、多 worker 协同、recoverable session 竞争、lease 协调。",
          tags: ["durable", "postgres", "multi-worker"],
        },
        en: {
          title: "Use postgres-embedded / postgres-workers for durable flows",
          body: "These examples show public Postgres bootstrap, multi-worker coordination, recoverable session contention, and lease handling.",
          tags: ["durable", "postgres", "multi-worker"],
        },
      },
      {
        step: { zh: "Path 6", en: "Path 6" },
        link: "../examples/postgres-websocket-embedding/README.md",
        zh: {
          title: "要 transport + durable + interactive 一起看，就看 postgres-websocket-embedding",
          body: "这是最接近真实平台接入的全链路示例之一：public bootstrap + builtins + adapter + interactive control。",
          tags: ["adapter", "interactive", "durable"],
        },
        en: {
          title: "Use postgres-websocket-embedding for transport + durable + interactive",
          body: "This is one of the closest end-to-end examples to a realistic platform embedding: public bootstrap + builtins + adapter + interactive control.",
          tags: ["adapter", "interactive", "durable"],
        },
      },
    ];

    const boundaries = {
      kernel: {
        tone: "green",
        zh: {
          title: "Kernel Owns",
          body: "只有那些会改变全局执行语义、恢复正确性、回放稳定性、治理闭环的概念，才应该进入 kernel。",
          items: [
            "task / session / plan / step lifecycle semantics",
            "plan -> policy -> approval -> execute -> verify -> recover",
            "loop budgets、retry / replan accounting",
            "attempts / actions / verifications / artifacts / runtime handles",
            "blocked runtime、interactive control、target resolution、attachment materialization",
            "capability resolution、snapshots、audit、metrics / trace hooks",
          ],
        },
        en: {
          title: "Kernel Owns",
          body: "Only concepts that change global execution semantics, recovery correctness, replay stability, or governed execution should enter the kernel.",
          items: [
            "task / session / plan / step lifecycle semantics",
            "plan -> policy -> approval -> execute -> verify -> recover",
            "loop budgets, retry / replan accounting",
            "attempts / actions / verifications / artifacts / runtime handles",
            "blocked runtime, interactive control, target resolution, attachment materialization",
            "capability resolution, snapshots, audit, metrics / trace hooks",
          ],
        },
      },
      outside: {
        tone: "orange",
        zh: {
          title: "Must Stay Outside",
          body: "这些东西不是没价值，而是不该定义成 kernel 概念。它们属于 adapter、module 或 embedding platform。",
          items: [
            "user / tenant / org / ownership / ACL / RBAC",
            "auth / gateway / token / OIDC / session login state",
            "approval UI、operator dashboards、search projections",
            "billing、quota、provider routing、business policy inheritance",
            "deployment topology、worker fleet orchestration、queue product logic",
            "transport envelopes、business-specific protocol semantics",
          ],
        },
        en: {
          title: "Must Stay Outside",
          body: "These concepts matter, but they should not become kernel concepts. They belong in adapters, modules, or the embedding platform.",
          items: [
            "user / tenant / org / ownership / ACL / RBAC",
            "auth / gateway / token / OIDC / session login state",
            "approval UI, operator dashboards, search projections",
            "billing, quota, provider routing, and business policy inheritance",
            "deployment topology, worker fleet orchestration, queue product logic",
            "transport envelopes and business-specific protocol semantics",
          ],
        },
      },
    };

    function render() {
      const lang = state.lang;
      const text = ui[lang];
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.title = text.title;

      document.getElementById("hero-eyebrow").textContent = text.heroEyebrow;
      document.getElementById("hero-title").textContent = text.heroTitle;
      document.getElementById("hero-subtitle").textContent = text.heroSubtitle;
      document.getElementById("atlas-title").textContent = text.atlasTitle;
      document.getElementById("atlas-subtitle").textContent = text.atlasSubtitle;
      document.getElementById("cap-title").textContent = text.capTitle;
      document.getElementById("cap-subtitle").textContent = text.capSubtitle;
      document.getElementById("module-title").textContent = text.moduleTitle;
      document.getElementById("module-subtitle").textContent = text.moduleSubtitle;
      document.getElementById("journey-title").textContent = text.journeyTitle;
      document.getElementById("journey-subtitle").textContent = text.journeySubtitle;
      document.getElementById("boundary-title").textContent = text.boundaryTitle;
      document.getElementById("boundary-subtitle").textContent = text.boundarySubtitle;
      document.getElementById("footer-copy").innerHTML = text.footerCopy;

      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });

      renderHero(text);
      renderLayers(lang);
      renderInspector(lang);
      renderCapabilities(lang);
      renderModules(lang);
      renderJourneys(lang);
      renderBoundary(lang);
      renderFooter(text);
    }

    function renderHero(text) {
      document.getElementById("hero-pills").innerHTML = text.heroPills
        .map((item) => `<span class="pill ${item.tone}">${item.text}</span>`)
        .join("");

      document.getElementById("hero-links").innerHTML = text.heroLinks
        .map((link) => `<a href="${link.href}">${link.text}</a>`)
        .join("");

      document.getElementById("stat-grid").innerHTML = text.stats
        .map((stat) => `
          <article class="stat-card">
            <div class="label">${stat.label}</div>
            <div class="value">${stat.value}</div>
            <div class="note">${stat.note}</div>
          </article>
        `)
        .join("");

      document.getElementById("legend-row").innerHTML = text.legend
        .map((item) => `<span class="legend-chip ${item.tone}">${item.text}</span>`)
        .join("");
    }

    function renderLayers(lang) {
      const layerGrid = document.getElementById("layer-grid");
      layerGrid.innerHTML = layers
        .map((layer) => {
          const layerText = layer[lang];
          return `
            <section class="layer-column">
              <header class="layer-head">
                <div class="layer-label">${layerText.label}</div>
                <div class="layer-title">${layerText.title}</div>
                <div class="layer-note">${layerText.note}</div>
              </header>
              ${layer.nodes.map((nodeId) => renderNodeCard(nodeId, lang)).join("")}
            </section>
          `;
        })
        .join("");

      layerGrid.querySelectorAll(".node-card").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeNode = button.dataset.node;
          renderInspector(lang);
          renderLayers(lang);
        });
      });
    }

    function renderNodeCard(nodeId, lang) {
      const node = nodes[nodeId];
      const copy = node[lang];
      const chips = node.chips[lang];
      const classes = ["node-card"];
      if (nodeId === state.activeNode) classes.push("active");
      if (node.outside) classes.push("outside");

      return `
        <button type="button" class="${classes.join(" ")}" data-node="${nodeId}">
          <div class="node-group">${node.category[lang]}</div>
          <div class="node-title">${copy.title}</div>
          <div class="node-subtitle">${copy.subtitle}</div>
          <div class="node-mini">
            ${chips.map((chip) => `<span class="mini-chip">${chip}</span>`).join("")}
          </div>
        </button>
      `;
    }

    function renderInspector(lang) {
      const node = nodes[state.activeNode];
      const copy = node[lang];
      const inspector = document.getElementById("inspector");
      inspector.innerHTML = `
        <div class="inspector-head">
          <div class="inspector-path">${node.path}</div>
          <h3 class="inspector-title">${copy.title}</h3>
          <p class="inspector-summary">${copy.summary}</p>
        </div>
        <div class="chip-row">
          ${node.chips[lang].map((chip) => `<span class="tag ${node.tone || ""}">${chip}</span>`).join("")}
        </div>
        <div class="inspector-block">
          <h3>${lang === "zh" ? "Highlights" : "Highlights"}</h3>
          <ul class="list">${copy.highlights.map((item) => `<li>${item}</li>`).join("")}</ul>
        </div>
        <div class="inspector-block">
          <h3>${lang === "zh" ? "Relations" : "Relations"}</h3>
          <ul class="list">${copy.relations.map((item) => `<li>${item}</li>`).join("")}</ul>
        </div>
        <div class="inspector-block">
          <h3>${lang === "zh" ? "Read Next" : "Read Next"}</h3>
          <div class="inspector-links">
            ${node.links.map((link) => `<a href="${link.href}">${link.label[lang]}</a>`).join("")}
          </div>
        </div>
      `;
    }

    function renderCapabilities(lang) {
      document.getElementById("cap-grid").innerHTML = capabilities
        .map((card) => {
          const copy = card[lang];
          return `
            <article class="cap-card">
              <div class="chip-row" style="margin-bottom: 12px;">
                <span class="tag ${card.tone}">${lang === "zh" ? "Capability" : "Capability"}</span>
              </div>
              <h3>${copy.title}</h3>
              <p>${copy.body}</p>
              <ul class="list" style="margin-top: 14px;">
                ${copy.points.map((point) => `<li>${point}</li>`).join("")}
              </ul>
            </article>
          `;
        })
        .join("");
    }

    function renderModules(lang) {
      document.getElementById("module-grid").innerHTML = moduleCards
        .map((card) => {
          const copy = card[lang];
          return `
            <article class="matrix-card">
              <div class="matrix-head">
                <div>
                  <div class="matrix-meta">${card.layer[lang]}</div>
                  <div class="matrix-path">${card.path}</div>
                </div>
              </div>
              <h3>${copy.title}</h3>
              <p>${copy.body}</p>
              <div class="chip-row" style="margin-top: 14px;">
                ${copy.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
              </div>
              <div style="margin-top: 14px;">
                <a class="matrix-link" href="${card.link}">${lang === "zh" ? "打开对应文件" : "Open related file"}</a>
              </div>
            </article>
          `;
        })
        .join("");
    }

    function renderJourneys(lang) {
      document.getElementById("journey-grid").innerHTML = journeys
        .map((item) => {
          const copy = item[lang];
          return `
            <article class="journey-card">
              <div class="journey-step">${item.step[lang]}</div>
              <h3>${copy.title}</h3>
              <p>${copy.body}</p>
              <div class="chip-row" style="margin-top: 14px;">
                ${copy.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
              </div>
              <div style="margin-top: 14px;">
                <a class="matrix-link" href="${item.link}">${lang === "zh" ? "打开示例说明" : "Open example guide"}</a>
              </div>
            </article>
          `;
        })
        .join("");
    }

    function renderBoundary(lang) {
      const kernel = boundaries.kernel[lang];
      const outside = boundaries.outside[lang];
      document.getElementById("boundary-grid").innerHTML = `
        <article class="boundary-card">
          <div class="chip-row" style="margin-bottom: 12px;">
            <span class="tag green">${lang === "zh" ? "Inside Kernel" : "Inside Kernel"}</span>
          </div>
          <h3>${kernel.title}</h3>
          <p>${kernel.body}</p>
          <ul class="list" style="margin-top: 14px;">
            ${kernel.items.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        </article>
        <article class="boundary-card outside">
          <div class="chip-row" style="margin-bottom: 12px;">
            <span class="tag orange">${lang === "zh" ? "Outside Kernel" : "Outside Kernel"}</span>
          </div>
          <h3>${outside.title}</h3>
          <p>${outside.body}</p>
          <ul class="list" style="margin-top: 14px;">
            ${outside.items.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        </article>
      `;
    }

    function renderFooter(text) {
      document.getElementById("footer-actions").innerHTML = text.footerActions
        .map((item) => `<a class="nav-link" href="${item.href}">${item.text}</a>`)
        .join("");
    }

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => {
        state.lang = button.dataset.lang;
        localStorage.setItem("architecture-tour-lang", state.lang);
        render();
      });
    });

    render();
  </script>
</body>
</html>
